name: Generate Profile Summary Cards

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}

      - name: Keep only github_dark theme + drop stats radar
        run: |
          if [ -d "profile-summary-card-output" ]; then
            cd profile-summary-card-output
            find . -mindepth 1 -maxdepth 1 -type d ! -name 'github_dark' -exec rm -rf {} +
            rm -f github_dark/3-stats.svg github_dark/README.md
            rm -f README.md
            cd ..
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase origin main
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore: keep only github_dark theme (drop unused themes + stats radar)"
              git push origin main
            fi
          fi
