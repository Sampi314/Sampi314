name: Generate Detailed Metrics

# ────────────────────────────────────────────────────────────────────
#  REQUIRED ONE-TIME SETUP
#  ----------------------------------------------------------------
#  This workflow needs a Personal Access Token to query the broader
#  GitHub API surface that lowlighter/metrics requires.
#
#  1. Go to https://github.com/settings/tokens?type=beta
#     (or use Classic: https://github.com/settings/tokens/new)
#
#  2. Generate token with these scopes:
#       - repo, read:user, read:org, read:packages, public_repo
#
#  3. Add it as a secret in this repo:
#       Settings → Secrets and variables → Actions → New repo secret
#       Name: METRICS_TOKEN
#       Value: <paste the PAT>
#
#  Until METRICS_TOKEN is added, this workflow will fail and the
#  metrics SVG referenced in README.md will not appear.
# ────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Generate metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Australia/Sydney
          config_padding: 5
          filename: github-metrics.svg

          output_action: commit
          committer_branch: output-metrics
          committer_message: "metrics: refresh dashboard"

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 10
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, gnuplot, batchfile, roff, vim script

          plugin_lines: yes
          plugin_followup: yes
          plugin_calendar: yes
          plugin_calendar_limit: 0
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_topics: yes
          plugin_topics_mode: starred
          plugin_topics_limit: 0

          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_facts: yes
