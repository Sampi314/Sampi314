name: Generate Snake

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake animation (neon orange palette)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23FF6B00&color_dots=%23ebedf0,%23ffe0c2,%23ffb380,%23ff8533,%23FF6B00
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23FF6B00&color_dots=%230d1117,%233d2008,%237a3a0d,%23cc5500,%23FF6B00

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
